name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_PORT: ${{ secrets.CPANEL_SSH_PORT || '22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm ci

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Prepare deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
        run: |
          sudo apt-get update
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Trust cPanel host
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
        run: |
          if [ -z "$CPANEL_HOST" ]; then
            echo "::error::CPANEL_HOST secret is empty or not set." >&2
            exit 1
          fi
          case "$CPANEL_HOST" in
            *"://"*|*"/"*|*" "*)
              echo "::error::CPANEL_HOST must be a bare hostname or IP (no https://, path, or spaces). Got something that looks like a URL." >&2
              exit 1
              ;;
          esac
          ssh-keyscan -T 15 -p "$SSH_PORT" -H "$CPANEL_HOST" >> ~/.ssh/known_hosts || true
          if ! grep -q . ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::ssh-keyscan got no host keys from $CPANEL_HOST on port $SSH_PORT. Check that the host is correct, SSH is enabled for your cPanel account, and the SSH port is right (many cPanel hosts use 2222 or 21098 instead of 22 — set the CPANEL_SSH_PORT secret if so)." >&2
            exit 1
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Upload repository to cPanel
        run: |
          ssh -p "$SSH_PORT" -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" "mkdir -p '${{ secrets.CPANEL_APP_ROOT }}'"
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="devserver.out.log" \
            --exclude="devserver.err.log" \
            -czf - . | ssh -p "$SSH_PORT" -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" "cd '${{ secrets.CPANEL_APP_ROOT }}' && tar -xzf -"

      - name: Configure Passenger app root
        run: |
          ssh -p "$SSH_PORT" -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cat > "/home/${{ secrets.CPANEL_USER }}/public_html/.htaccess" <<'HTACCESS'
          PassengerEnabled on
          PassengerAppRoot ${{ secrets.CPANEL_APP_ROOT }}
          PassengerBaseURI /
          PassengerAppType node
          PassengerStartupFile app.js
          PassengerNodejs ${{ secrets.CPANEL_NODE_PATH }}
          HTACCESS
          EOF

      - name: Write production environment file
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
        run: |
          ssh -p "$SSH_PORT" -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cat > "${{ secrets.CPANEL_APP_ROOT }}/.env.production" <<ENVFILE
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_SECURE=${SMTP_SECURE}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          CONTACT_TO_EMAIL=${CONTACT_TO_EMAIL}
          ENVFILE
          chmod 600 "${{ secrets.CPANEL_APP_ROOT }}/.env.production"
          EOF

      - name: Restart Passenger app
        run: |
          ssh -p "$SSH_PORT" -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cd "${{ secrets.CPANEL_APP_ROOT }}"
          mkdir -p tmp
          touch tmp/restart.txt
          EOF
