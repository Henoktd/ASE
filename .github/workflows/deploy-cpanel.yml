name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ssh-agent and add deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
        run: |
          sudo apt-get update
          sudo apt-get install -y expect rsync
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          eval "$(ssh-agent -s)"
          expect <<'EOF'
          log_user 1
          spawn ssh-add $env(HOME)/.ssh/deploy_key
          expect "Enter passphrase for*"
          send "$env(SSH_PASSPHRASE)\r"
          expect eof
          EOF
          ssh-add -l

      - name: Trust cPanel host
        run: |
          ssh-keyscan -H "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync repository to cPanel
        run: |
          rsync -az --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".next" \
            --exclude "devserver.out.log" \
            --exclude "devserver.err.log" \
            ./ "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:${{ secrets.CPANEL_APP_ROOT }}/"

      - name: Install dependencies, build, and restart Passenger app
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cd "${{ secrets.CPANEL_APP_ROOT }}"
          "${{ secrets.CPANEL_NODE_PATH }}" "${{ secrets.CPANEL_NPM_CLI }}" ci
          "${{ secrets.CPANEL_NODE_PATH }}" "${{ secrets.CPANEL_NPM_CLI }}" run build
          mkdir -p tmp
          touch tmp/restart.txt
          EOF
