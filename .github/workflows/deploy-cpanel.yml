name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm ci

      - name: Build application
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Prepare deploy key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
        run: |
          sudo apt-get update
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

      - name: Trust cPanel host
        run: |
          ssh-keyscan -H "${{ secrets.CPANEL_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload repository to cPanel
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" "mkdir -p '${{ secrets.CPANEL_APP_ROOT }}'"
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="devserver.out.log" \
            --exclude="devserver.err.log" \
            -czf - . | ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" "cd '${{ secrets.CPANEL_APP_ROOT }}' && tar -xzf -"

      - name: Configure Passenger app root
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cat > "/home/${{ secrets.CPANEL_USER }}/public_html/.htaccess" <<'HTACCESS'
          PassengerEnabled on
          PassengerAppRoot ${{ secrets.CPANEL_APP_ROOT }}
          PassengerBaseURI /
          PassengerAppType node
          PassengerStartupFile app.js
          PassengerNodejs ${{ secrets.CPANEL_NODE_PATH }}
          HTACCESS
          EOF

      - name: Write production environment file
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cat > "${{ secrets.CPANEL_APP_ROOT }}/.env.production" <<ENVFILE
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_SECURE=${SMTP_SECURE}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          SMTP_FROM=${SMTP_FROM}
          CONTACT_TO_EMAIL=${CONTACT_TO_EMAIL}
          ENVFILE
          chmod 600 "${{ secrets.CPANEL_APP_ROOT }}/.env.production"
          EOF

      - name: Restart Passenger app
        run: |
          ssh -i "$HOME/.ssh/deploy_key" -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=20 "${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}" <<EOF
          set -e
          cd "${{ secrets.CPANEL_APP_ROOT }}"
          mkdir -p tmp
          touch tmp/restart.txt
          EOF
